<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{login.title}">Вхід</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-container { max-width: 400px; margin: 50px auto; padding: 30px; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-red-action { background-color: #e60000; color: white; width: 100%; border-radius: 50px; padding: 10px; border: none; font-weight: 700; }
        .btn-red-action:hover { background-color: #b30000; }
        .lang-switcher { margin-bottom: 20px; text-align: right; }
        .home-link { display: block; text-align: center; margin-bottom: 20px; color: #6c757d; text-decoration: none; }
    </style>
</head>
<body class="bg-light">

<div class="container">
    <div class="form-container">
        <a th:href="@{/}" class="home-link">
            <i class="bi bi-house-door"></i> На головну
        </a>

        <div class="lang-switcher">
            <a th:href="@{/login(lang='uk')}" class="text-decoration-none">UA</a> |
            <a th:href="@{/login(lang='en')}" class="text-decoration-none">EN</a>
        </div>

        <h2 class="text-center fw-bold mb-4" th:text="#{login.title}">Вхід</h2>

        <div th:if="${param.error}" class="alert alert-danger" th:text="#{login.error}">Помилка входу</div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/login}" th:object="${loginDto}" method="POST">
            <div class="mb-3">
                <label class="form-label" th:text="#{login.email}">Email</label>
                <input type="email" th:field="*{email}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label" th:text="#{login.password}">Пароль</label>
                <input type="password" th:field="*{password}" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-red-action" th:text="#{login.button}">УВІЙТИ</button>

            <div class="text-center mt-3">
                <span th:text="#{login.no_account}">Ще немає акаунту?</span>
                <a th:href="@{/register}" class="text-decoration-none" th:text="#{login.register}">Зареєструватися</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
