<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{error.balance.title}">Помилка оплати</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-container { max-width: 450px; margin: 80px auto; padding: 40px; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .btn-red-action { background-color: #e60000; color: white; border-radius: 50px; padding: 12px 30px; border: none; font-weight: 700; text-transform: uppercase; text-decoration: none; display: inline-block; }
        .btn-red-action:hover { background-color: #b30000; color: white; }
        .icon-error { font-size: 4rem; color: #e60000; margin-bottom: 20px; }
        .lang-switcher { position: absolute; top: 20px; right: 20px; }
    </style>
</head>
<body class="bg-light">



<div class="container">
    <div class="form-container">
        <div class="d-flex justify-content-end p-3">
            <div class="btn-group" role="group">
                <a href="?lang=uk" class="btn btn-outline-secondary btn-sm">UA</a>
                <a href="?lang=en" class="btn btn-outline-secondary btn-sm">EN</a>
            </div>
        </div>
        <div class="icon-error"><i class="bi bi-exclamation-circle"></i></div>

        <h2 class="fw-bold mb-3" th:text="#{error.balance.header}">Недостатньо коштів</h2>
        <p class="text-muted mb-4" th:text="#{error.balance.message}">На вашому рахунку недостатньо коштів для здійснення цієї покупки.</p>

        <div class="d-flex flex-column gap-2">
            <a href="/profile" class="btn btn-dark rounded-pill" th:text="#{error.balance.btn.profile}">Перейти до профілю</a>
            <a href="/" class="text-decoration-none text-secondary mt-2" th:text="#{error.balance.btn.home}">На головну</a>
        </div>
    </div>
</div>

<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</body>
</html>
