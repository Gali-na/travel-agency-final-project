<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{admin.users.title}">Управління користувачами</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .admin-card { background: #fff; border-radius: 12px; border: 1px solid #ededed; }
        .btn-red-action { background-color: #e60000; color: white; border-radius: 50px; border: none; }
        .btn-red-action:hover { background-color: #b30000; color: white; }
    </style>
</head>
<body class="bg-light">
<div class="container my-3">
    <div class="d-flex justify-content-end gap-2">
        <a th:href="@{/admin/users(lang='uk', email=${param.email}, page=${users.number})}"
           class="btn btn-sm btn-outline-secondary">UA</a>
        <a th:href="@{/admin/users(lang='en', email=${param.email}, page=${users.number})}"
           class="btn btn-sm btn-outline-secondary">EN</a>
    </div>
</div>
<div class="container my-5">

    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold m-0" th:text="#{admin.users.title}">Управління користувачами</h2>
                <a href="/" class="btn btn-outline-secondary">
                    <i class="bi bi-house-door"></i> <span th:text="#{admin.home}">На головну</span>
                </a>
            </div>

            <div class="admin-card p-4 shadow-sm">
                <form class="mb-4 d-flex gap-2" method="get" th:action="@{/admin/users}">
                    <input type="text" name="email" class="form-control"
                           th:placeholder="#{admin.search.placeholder}"
                           th:value="${param.email}">
                    <button type="submit" class="btn btn-outline-dark" th:text="#{admin.search.btn}">Пошук</button>
                </form>

                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th th:text="#{admin.table.firstname}">Ім'я</th>
                        <th th:text="#{admin.table.lastname}">Прізвище</th>
                        <th th:text="#{admin.table.status}">Статус</th>
                        <th th:text="#{admin.table.actions}">Дії</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users.content}">
                        <td th:text="${user.firstName}">Ім'я</td>
                        <td th:text="${user.lastName}">Прізвище</td>
                        <td>
                            <span th:if="${user.locked}" class="badge bg-danger" th:text="#{admin.status.locked}">Заблокований</span>
                        </td>
                        <td>
                            <form th:if="${!user.locked}" th:action="@{/admin/users/lock/{id}(id=${user.userId})}" method="post">
                                <button type="submit" class="btn btn-sm btn-outline-danger" th:text="#{admin.btn.lock}">Заблокувати</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <nav aria-label="Page navigation">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${users.first ? 'disabled' : ''}">
                            <a class="page-link"
                               th:href="@{/admin/users(page=${users.number - 1}, size=${users.size}, email=${param.email})}"
                               th:text="#{admin.pagination.prev}">Попередня</a>
                        </li>

                        <li class="page-item"
                            th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}"
                            th:classappend="${i == users.number ? 'active' : ''}">
                            <a class="page-link"
                               th:href="@{/admin/users(page=${i}, size=${users.size}, email=${param.email})}"
                               th:text="${i + 1}">1</a>
                        </li>

                        <li class="page-item" th:classappend="${users.last ? 'disabled' : ''}">
                            <a class="page-link"
                               th:href="@{/admin/users(page=${users.number + 1}, size=${users.size}, email=${param.email})}"
                               th:text="#{admin.pagination.next}">Наступна</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
