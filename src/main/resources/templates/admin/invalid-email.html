<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Помилка пошуку</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        /* Змінено колір іконки на помаранчевий для помилки */
        .icon { font-size: 50px; color: #e67e22; margin-bottom: 1rem; }
        h1 { color: #2c3e50; }
        p { color: #555; }
        a { display: inline-block; margin-top: 1.5rem; padding: 10px 20px; background: #e60000; color: white; text-decoration: none; border-radius: 5px; }
        a:hover { background: #b30000; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">⚠</div>
    <h1>Email не знайдено</h1>
    <p>Вибачте, користувача з такою електронною адресою не існує в системі.</p>
    <a href="/admin/users">Повернутися до списку</a>
</div>
</body>
</html>
