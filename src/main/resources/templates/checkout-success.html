<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <title th:text="#{checkout.success.title}">Успішна оплата</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        .icon { font-size: 50px; color: #27ae60; margin-bottom: 1rem; }
        h1 { color: #2c3e50; }
        a.home-btn { display: inline-block; margin-top: 1.5rem; padding: 10px 20px; background: #3498db; color: white; text-decoration: none; border-radius: 5px; }
        a.home-btn:hover { background: #2980b9; }
        .lang-switcher { position: absolute; top: 20px; right: 20px; }
    </style>
</head>
<body>



<div class="card">
    <div class="d-flex justify-content-end p-3">
        <div class="btn-group" role="group">
            <a href="?lang=uk" class="btn btn-outline-secondary btn-sm">UA</a>
            <a href="?lang=en" class="btn btn-outline-secondary btn-sm">EN</a>
        </div>
    </div>
    <div class="icon">✓</div>
    <h1 th:text="#{checkout.success.header}">Оплата успішна!</h1>
    <p th:text="#{checkout.success.message}">Дякуємо за ваш вибір. Ваше замовлення було успішно оброблено.</p>
    <a href="/" class="home-btn" th:text="#{checkout.success.home}">На головну</a>
</div>

</body>
</html>
